name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/cronix-linux-amd64 ./cmd/cronix

      - name: Build linux/arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o dist/cronix-linux-arm64 ./cmd/cronix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cronix-linux-amd64
            dist/cronix-linux-arm64
          generate_release_notes: true
